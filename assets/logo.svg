<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- circle background -->
  <circle cx="50" cy="50" r="48" fill="#3498db" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- tree (symbolizing "Lípa") -->
  <ellipse cx="50" cy="35" rx="15" ry="18" fill="#27ae60"/>
  <rect x="47" y="45" width="6" height="15" fill="#8b7355"/>
  
  <!-- book (symbolizing education) -->
  <rect x="30" y="50" width="12" height="14" fill="#e74c3c" rx="1"/>
  <line x1="36" y1="50" x2="36" y2="64" stroke="#fff" stroke-width="0.5"/>
  <line x1="32" y1="52" x2="40" y2="52" stroke="#fff" stroke-width="0.5"/>
  
  <!-- pencil (symbolizing writing) -->
  <line x1="58" y1="50" x2="70" y2="60" stroke="#f39c12" stroke-width="2"/>
  <polygon points="70,60 72,58 74,60" fill="#f39c12"/>
</svg>